#{extends 'main.html' /}
#{set title:'Nova Reserva' /}

<div class="page-header">
    <div>
        <h1>
            <i class="bi bi-bag-plus"></i>
            #{if r?.id} Editar Reserva #{/if}#{else} Nova Reserva #{/else}
        </h1>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card form-card">
            <div class="card-body p-4">
                <form action="@{Reservas.salvar}" method="post">
                    <input type="hidden" name="r.id" value="${r?.id}">

                    <div class="mb-3">
                        <label class="form-label">Cliente</label>
                        <input type="text" name="r.nomeCliente" value="${r?.nomeCliente}"
                               class="form-control" placeholder="Nome do cliente" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Produto</label>
                        <select name="r.produto.id" class="form-select">
                            #{list items:produtos, as:'prod'}
                            <option value="${prod.id}" ${prod.id == r?.produto?.id ? 'selected' : ''}>
                                ${prod.nomeProduto} — R$ ${prod.preco}
                            </option>
                            #{/list}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Quantidade</label>
                        <input type="number" name="r.quantidade" value="${r?.quantidade}"
                               class="form-control" min="1" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Observação / Sabor</label>
                        <textarea name="r.observacao" class="form-control" rows="3"
                                  placeholder="Ex: sabor Pudim, entregar de 14:30">${r?.observacao}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-brand flex-fill">
                            <i class="bi bi-check-lg"></i> Gravar Reserva
                        </button>
                        <a href="@{Reservas.listar}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
