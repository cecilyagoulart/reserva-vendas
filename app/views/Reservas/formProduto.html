#{extends 'main.html' /}
#{set title:'Cadastro de Produto' /}

<div class="page-header">
    <div>
        <h1><i class="bi bi-box-seam"></i>
            #{if p?.id} Editar Produto #{/if}#{else} Cadastro de Produto #{/else}
        </h1>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card form-card">
            <div class="card-body p-4">
                <form action="@{Reservas.salvarProduto}" method="post">
                    <input type="hidden" name="p.id" value="${p?.id}">

                    <div class="mb-3">
                        <label class="form-label">Nome do Produto</label>
                        <input type="text" name="p.nomeProduto" value="${p?.nomeProduto}"
                               class="form-control" placeholder="Ex: Dindin de Pudim" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" step="0.01" name="p.preco" value="${p?.preco}"
                               class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Estoque inicial</label>
                        <input type="number" name="p.estoque" value="${p?.estoque}"
                               class="form-control" placeholder="0" min="0" required
                               ${p?.id ? 'readonly' : ''}>
                        #{if p?.id}
                            <div class="form-text">Para alterar o estoque, use "Adicionar Estoque" na tela de Estoque.</div>
                        #{/if}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-brand flex-fill">
                            <i class="bi bi-check-lg"></i>
                            #{if p?.id} Atualizar Produto #{/if}#{else} Salvar Produto #{/else}
                        </button>
                        <a href="@{Reservas.listarProdutos}" class="btn btn-outline-secondary">
                            Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
