#{extends 'main.html' /}
#{set title:'Home' /}


<form action="@{Reservas.salvarProduto}" method="post">
    
    *{ Campo oculto para o ID, necessário para identificar se é edição }*
    <input type="hidden" name="p.id" value="${p?.id}">

    <label>Nome do Produto:</label><br/>
    <input type="text" name="p.nomeProduto" value="${p?.nomeProduto}"><br/><br/>

    <label>Preço:</label><br/>
    <input type="number" step="0.01" name="p.preco" value="${p?.preco}"><br/><br/>

    <input type="submit" value="Salvar Produto">
</form>

<br/>
<a href="forms.html">Voltar para o formulário de Reserva</a>
